<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14213D"/>
      <stop offset="100%" stop-color="#1e2d4f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E4CD8D"/>
      <stop offset="100%" stop-color="#A68940"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#C9A961" stroke-width="2" opacity="0.25"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#C9A961" stroke-width="2" opacity="0.18"/>
  <!-- Hebrew letter ד centered -->
  <text x="256" y="356" font-family="Frank Ruhl Libre, Georgia, serif" font-size="320" font-weight="700" fill="url(#gold)" text-anchor="middle">ד</text>
</svg>
