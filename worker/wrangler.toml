name = "doron-api"
main = "src/index.js"
compatibility_date = "2025-01-15"

# ——— KV Namespace ———
# צור namespace בפעם הראשונה בדשבורד (Workers & Pages → KV → Create namespace)
# ואז החלף כאן את ה-id בזה שקיבלת.
[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_YOUR_KV_ID"

# ——— Environment variables ———
# אופציונלי: להגביל CORS רק לדומיין של ה-Pages שלך, למשל:
#   ALLOWED_ORIGINS = "https://doron-site.pages.dev,https://doron.co.il"
# אם לא מוגדר — מקבל מכל מקום (טוב לפיתוח, פחות מאובטח בפרודקשן).
[vars]
ALLOWED_ORIGINS = "*"
